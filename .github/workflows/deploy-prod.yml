name: Deploy Production App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      APP_ENV: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks CLI profile
        run: >
          databricks configure --profile DEFAULT
          --host "${DATABRICKS_HOST}"
          --token "${DATABRICKS_TOKEN}"

      - name: Create workspace directory
        run: |
          databricks workspace mkdirs \
            /Workspace/Shared/apps/databricks-cicd-demo-prod \
            --profile DEFAULT

      - name: Delete existing app.py if exists
        run: |
          databricks workspace delete \
            /Workspace/Shared/apps/databricks-cicd-demo-prod/app.py \
            --profile DEFAULT || true

      - name: Upload app.py to workspace
        run: |
          databricks workspace import \
            --file ./app/app.py \
            --format RAW \
            --overwrite \
            --profile DEFAULT \
            /Workspace/Shared/apps/databricks-cicd-demo-prod/app.py

      - name: Upload app.yaml to workspace
        run: |
          databricks workspace import \
            --file ./app/app.yaml \
            --format RAW \
            --overwrite \
            --profile DEFAULT \
            /Workspace/Shared/apps/databricks-cicd-demo-prod/app.yaml

      - name: Upload requirements.txt to workspace
        run: |
          databricks workspace import \
            --file ./requirements.txt \
            --format RAW \
            --overwrite \
            --profile DEFAULT \
            /Workspace/Shared/apps/databricks-cicd-demo-prod/requirements.txt

      - name: Create app if not exists
        run: |
          databricks apps create databricks-cicd-demo-prod \
            --profile DEFAULT 2>/dev/null || true

      - name: Deploy app
        run: >
          databricks apps deploy databricks-cicd-demo-prod
          --source-code-path /Workspace/Shared/apps/databricks-cicd-demo-prod
          --profile DEFAULT
          --no-wait
