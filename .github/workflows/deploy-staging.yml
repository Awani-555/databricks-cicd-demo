name: Deploy Staging App

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      APP_ENV: staging
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy staging app
        run: >
          databricks apps deploy databricks-cicd-demo-pr-${PR_NUMBER}
          --source-code-path ./app
          --host ${DATABRICKS_HOST}
          --token ${DATABRICKS_TOKEN}

      - name: Comment deployed app URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const appName = `databricks-cicd-demo-pr-${process.env.PR_NUMBER}`;
            const host = process.env.DATABRICKS_HOST.replace(/\/$/, "");
            const appUrl = `${host}/apps/${appName}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Staging app deployed: ${appUrl}`,
            });
